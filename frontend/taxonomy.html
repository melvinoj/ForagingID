<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LandMemory — Taxonomy Tree (prototype)</title>
<link rel="stylesheet" href="/static/css/tokens.css">
<link rel="stylesheet" href="/static/css/site-header.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg: #14100c;
    --bg2: #1c1610;
    --ink: #e8e0d2;
    --ink-dim: #9a8f7d;
    --bark: #7a5c3e;
    --bark-dim: #5a4530;
    /* Class/order/family LABEL TEXT colour (dots stay --bark, unchanged).
       Superseded 9 July: the first pass derived these from --bark (amber/
       brown tonal steps) and it read as low-legibility mud against the
       previous plain --ink white — this version is white-BASED instead,
       one subtle hue tint per tier, all near --ink's own lightness
       (~85-87%) so contrast against --bg stays as good as plain --ink.
       Blue/red sit at S=26% (H=215/355); yellow needed S=48% and a couple
       points lower L to actually read as tinted at all — pale yellow
       desaturates toward "looks like plain cream" much faster than blue
       or red at the same saturation (a real perceptual asymmetry, not an
       inconsistency), and --ink itself is already a warm H=38° cream, so
       a weak yellow tint would have been nearly indistinguishable from
       untouched genus/kingdom text. */
    --ink-class: #d5dce7;   /* white, subtle blue tint */
    --ink-order: #e7d5d7;   /* white, subtle red tint */
    --ink-family: #e7e6bb;  /* white, subtle yellow tint */
    --leaf: #7ca85c;
    --leaf-bright: #a3c77e;
    --fungi: #c8963e;
    --fungi-dim: #8a6a2e;
    --plant-green: #3f9e52;  /* plant fan genus/species node fill — fresh, saturated green, distinct from --leaf/--leaf-bright (olive-toned) and from --lichen (grey-sage) */
    --plant: var(--plant-green);  /* legend "Plant" swatch — aliased to --plant-green so the swatch always matches the actual genus/species node colour */
    --lichen: #8fae9c;   /* legend "Lichen" swatch AND actual Lecanoromycetes species node fill — lichen-green, distinct shade from --plant-green */
    --unplaced: #b5503f;
    --panel: rgba(28,22,16,0.92);
    --line: rgba(122,92,62,0.25);
  }
  /* This page's own --ink (above) is the tree's light foreground text colour,
     not the site-wide chrome colour site-header.css expects (dark ink /
     cream paper, from tokens.css) — the two share a name by coincidence.
     Pin the shared nav chip/drawer to the site's actual token values so they
     render correctly here without touching --ink anywhere the tree uses it. */
  #site-nav-chip, #nav-drawer { background: #1E2A22; color: #FDFDFB; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at 50% 120%, var(--bg2), var(--bg));
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }
  #wrap { position: fixed; inset: 0; }
  svg { width: 100%; height: 100%; display: block; cursor: grab; }
  svg.dragging { cursor: grabbing; }

  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 14px 20px 14px 64px;
    display: flex; align-items: baseline; gap: 14px;
    pointer-events: none;
  }
  .header h1 {
    margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.3px;
  }
  .header .sub { font-size: 12px; color: var(--ink-dim); }
  .badge {
    pointer-events: auto;
    font-size: 11px; color: var(--ink-dim);
    background: var(--panel); border: 1px solid var(--line);
    padding: 3px 9px; border-radius: 20px;
  }

  /* Legend collapses into a chip, expands into the panel on click — mirrors
     the map page's #legend-chip / toggleLegendPanel() convention (frontend/
     index.html): a round chip toggles a `.visible` class on the panel, which
     is `display:none` until then and carries its own explicit close button. */
  #legend-chip {
    position: fixed; bottom: 16px; left: 16px; z-index: 11;
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; backdrop-filter: blur(8px); transition: border-color .15s;
  }
  #legend-chip:hover { border-color: var(--bark); }

  .legend {
    display: none;
    position: fixed; bottom: 66px; left: 16px; z-index: 10;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 12px 14px;
    font-size: 12px; min-width: 168px;
    backdrop-filter: blur(8px);
  }
  .legend.visible { display: block; }
  .legend .row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }
  .legend .dot { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 auto; }
  .legend .hint { color: var(--ink-dim); font-size: 11px; margin-top: 8px; line-height: 1.4; }
  .legend-close {
    position: absolute; top: 6px; right: 6px;
    min-width: 20px; min-height: 20px; padding: 0;
    background: none; border: none; color: var(--ink-dim); font-size: 0.8rem; cursor: pointer;
  }
  .legend-close:hover { color: var(--ink); }

  .controls {
    position: fixed; bottom: 16px; right: 16px; z-index: 10;
    display: flex; flex-direction: column; gap: 8px;
  }
  .controls button {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
    font-size: 17px; line-height: 1;
    backdrop-filter: blur(8px); transition: border-color .15s;
  }
  .controls button:hover { border-color: var(--bark); }

  .tip {
    position: fixed; z-index: 20; pointer-events: none;
    background: rgba(10,8,6,0.96); border: 1px solid var(--line);
    border-radius: 9px; padding: 8px 11px; font-size: 12px;
    max-width: 240px; opacity: 0; transition: opacity .12s;
    box-shadow: 0 6px 22px rgba(0,0,0,0.5);
  }
  .tip .t-name { font-style: italic; color: var(--leaf-bright); }
  .tip .t-rank { color: var(--ink-dim); font-size: 10px; text-transform: uppercase; letter-spacing: .5px; }
  .tip .t-meta { color: var(--ink-dim); margin-top: 3px; }

  /* Species-click popup — navigation only (thumbnail from an existing
     observations endpoint, scientific name, link to the existing read-only
     /species?s= card route). No edibility/verdict/warnings/card content —
     that's the card page's job, not this popup's; a thumbnail image is the
     one exception, explicitly OK'd (2026-07-08) — the safety boundary is
     "no DB writes", not "no imagery". */
  .species-popup {
    display: none;
    position: fixed; z-index: 30;
    background: rgba(10,8,6,0.96); border: 1px solid var(--line);
    border-radius: 9px; padding: 10px 26px 10px 12px; font-size: 12px;
    max-width: 240px; text-align: center;
    box-shadow: 0 6px 22px rgba(0,0,0,0.5);
  }
  .species-popup.visible { display: block; }
  .species-popup-close {
    position: absolute; top: 5px; right: 5px;
    min-width: 20px; min-height: 20px; padding: 0;
    background: none; border: none; color: var(--ink-dim); font-size: 0.8rem; cursor: pointer;
  }
  .species-popup-close:hover { color: var(--ink); }
  .species-popup-thumb {
    display: none; width: 64px; height: 64px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--line); margin: 2px auto 8px;
  }
  .species-popup-thumb.visible { display: block; }
  .species-popup-name { font-style: italic; color: var(--ink); margin-bottom: 8px; }
  .species-popup-link { display: inline-block; color: var(--leaf-bright); font-size: 11px; font-weight: 600; text-decoration: none; }
  .species-popup-link:hover { text-decoration: underline; }

  .link { fill: none; stroke: var(--bark); stroke-opacity: 0.55; }
  .node-label {
    font-size: 11px; fill: var(--ink); pointer-events: auto; cursor: pointer;
    user-select: none; -webkit-user-select: none;
    paint-order: stroke; stroke: var(--bg); stroke-width: 3px; stroke-linejoin: round;
  }
  .node-label.rank-class { fill: var(--ink-class); }
  .node-label.rank-order { fill: var(--ink-order); }
  .node-label.rank-family { font-size: 12.5px; font-weight: 600; fill: var(--ink-family); }
  .node-label.rank-species { font-style: italic; fill: var(--ink-dim); }
  .node-circle { cursor: pointer; transition: r .15s; }
  .collapsed-ring { fill: none; stroke-dasharray: 2 2; }
</style>
</head>
<body>
<div id="wrap">
  <div class="header">
    <h1>Taxonomy</h1>
    <span class="sub">Plantae — a living tree of what you've found</span>
    <span class="badge" id="count-badge">—</span>
  </div>
  <svg id="tree"></svg>
  <button id="legend-chip" onclick="toggleLegend()" aria-label="Open legend" aria-haspopup="true" aria-expanded="false">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="5" width="4" height="4" rx="1"/>
      <line x1="10" y1="7" x2="21" y2="7"/>
      <rect x="3" y="11" width="4" height="4" rx="1"/>
      <line x1="10" y1="13" x2="21" y2="13"/>
      <rect x="3" y="17" width="4" height="4" rx="1"/>
      <line x1="10" y1="19" x2="21" y2="19"/>
    </svg>
  </button>
  <div class="legend" id="legend-panel">
    <button class="legend-close" onclick="closeLegend()" aria-label="Close legend">✕</button>
    <div class="row"><span class="dot" style="background:var(--plant)"></span> Plant</div>
    <div class="row"><span class="dot" style="background:var(--fungi)"></span> Fungi</div>
    <div class="row"><span class="dot" style="background:var(--lichen)"></span> Lichen</div>
    <div class="row"><span class="dot" style="background:var(--ink-class)"></span> Class text</div>
    <div class="row"><span class="dot" style="background:var(--ink-order)"></span> Order text</div>
    <div class="row"><span class="dot" style="background:var(--ink-family)"></span> Family text</div>
    <div class="row"><span class="dot" style="background:var(--unplaced)"></span> Unplaced — needs review</div>
    <div class="hint">Click a bough to fold / unfold.<br>Drag to pan · scroll to zoom.</div>
  </div>
  <div class="controls">
    <button id="zoom-in" title="Zoom in">+</button>
    <button id="zoom-out" title="Zoom out">−</button>
    <button id="reset" title="Reset view">⤢</button>
  </div>
  <div class="tip" id="tip"></div>
  <div class="species-popup" id="species-popup">
    <button class="species-popup-close" onclick="closeSpeciesPopup()" aria-label="Close">✕</button>
    <img class="species-popup-thumb" id="species-popup-thumb" alt="">
    <div class="species-popup-name" id="species-popup-name"></div>
    <a class="species-popup-link" id="species-popup-link" href="#">View card</a>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// LIVE DATA — fetched from /api/species/taxonomy-tree (Unit A GBIF lineage).
// Shape: { RAW: { Plantae: { class_: { order_: { family: { genus: [names] } } } } },
//          FUNGI: { class_: { order_: { family: { genus: [names] } } } },
//          UNPLACED: [ "scientific name (reason)", ... ] }
// Populated by loadAndRender() below, once the fetch resolves.
// ---------------------------------------------------------------------------
let RAW = { Plantae: {} };
let FUNGI = {};
let UNPLACED = [];

// Type guard used by buildTree()/buildFungiTree() at every nesting level: a
// stale cached response (older endpoint shape) can hand us a string or array
// where an object of {key: subtree} is expected, or vice versa. Object.entries()
// never throws on the wrong type, but the mismatched value it produces does,
// several levels deeper — so every level checks its own input and skips the
// entry rather than let a malformed branch reach .map()/Object.entries() and
// throw. A bad/stale response degrades to a partial or empty tree, never a
// frozen page.
function _isPlainObject(x) {
  return x !== null && typeof x === "object" && !Array.isArray(x);
}

// ---- build hierarchy ----
// ---- build hierarchy (kingdom > family > genus > species) ----
function buildTree() {
  const root = { name: "Plantae", rank: "kingdom", children: [] };
  for (const [cls, orders] of Object.entries(RAW.Plantae)) {
    if (!_isPlainObject(orders)) continue;
    const clsNode = { name: cls, rank: "class", children: [] };
    for (const [ord, families] of Object.entries(orders)) {
      if (!_isPlainObject(families)) continue;
      const ordNode = { name: ord, rank: "order", children: [] };
      for (const [fam, genera] of Object.entries(families)) {
        if (!_isPlainObject(genera)) continue;
        const famNode = { name: fam, rank: "family", children: [] };
        for (const [gen, species] of Object.entries(genera)) {
          if (!Array.isArray(species)) continue;
          famNode.children.push({ name: gen, rank: "genus",
            children: species.map(s => ({ name: s, rank: "species" })) });
        }
        ordNode.children.push(famNode);
      }
      clsNode.children.push(ordNode);
    }
    root.children.push(clsNode);
  }
  return root;
}

// Same walk as buildTree(), reading FUNGI instead of RAW.Plantae, rooted at
// "Fungi" instead of "Plantae". Every node is tagged fungi:true so colourFor()
// and the link-stroke logic in update() can render this fan amber instead of
// the plant fan's green/bark/cream — the two fans otherwise share identical
// rank strings ("kingdom"/"class"/"order"/"family"/"genus"/"species") so all
// existing CSS (.rank-family bold, .rank-species italic) and showTip() meta
// logic apply unchanged to fungi nodes too.
// Lichen carve-out: `cls` here IS the class_ name (FUNGI's top-level key), so
// cls === "Lecanoromycetes" is the exact rule confirmed earlier (Agaricomycetes
// 21 / Sordariomycetes 3 / Saccharomycetes 1 / Dacrymycetes 1 = true fungi;
// only Lecanoromycetes = lichen). Only SPECIES nodes get `lichen: true` — class/
// order/family/genus under Lecanoromycetes stay plain fungi:true (amber),
// per spec ("Fungi fan unchanged except the 4 Lecanoromycetes species").
function buildFungiTree() {
  const root = { name: "Fungi", rank: "kingdom", fungi: true, children: [] };
  for (const [cls, orders] of Object.entries(FUNGI)) {
    if (!_isPlainObject(orders)) continue;
    const lichen = cls === "Lecanoromycetes";
    const clsNode = { name: cls, rank: "class", fungi: true, children: [] };
    for (const [ord, families] of Object.entries(orders)) {
      if (!_isPlainObject(families)) continue;
      const ordNode = { name: ord, rank: "order", fungi: true, children: [] };
      for (const [fam, genera] of Object.entries(families)) {
        if (!_isPlainObject(genera)) continue;
        const famNode = { name: fam, rank: "family", fungi: true, children: [] };
        for (const [gen, species] of Object.entries(genera)) {
          if (!Array.isArray(species)) continue;
          famNode.children.push({ name: gen, rank: "genus", fungi: true,
            children: species.map(s => ({ name: s, rank: "species", fungi: true, lichen })) });
        }
        ordNode.children.push(famNode);
      }
      clsNode.children.push(ordNode);
    }
    root.children.push(clsNode);
  }
  return root;
}

// Computes how much angular arc the PLANT fan's genus tier actually needs —
// confirmed 9 July (v2): each genus gets a slot of GENUS_SLOT_UNIT *
// max(1, species_count) (a single-species genus gets one unit; a 10-species
// genus gets ten) — then sizes PLANT_ARC/ARC_START to exactly fit the sum of
// all slots, and shrinks FUNGI_ARC/FUNGI_ARC_START to whatever's left so the
// two fans stay non-overlapping on the same circle (they still sum to a full
// 2π with the same 1.5°-per-side gap convention documented above).
// GENUS_SLOT_UNIT = 0.65° is a deliberate choice, not derived from a single
// "smallest gap that worked" number the way earlier tiers were — there's no
// such number here (see the 9 July recon: genus spacing is uniform
// everywhere, there's no already-fine region to measure). It's chosen to
// land PLANT_ARC at a large-but-workable ~298° (real 458-plant-species
// total confirmed against live data), leaving fungi ~59° — down from its
// previous fixed 150°, but proportionally MORE generous than plant gets per
// species (fungi: ~30 species / ~59° ≈ 1.97°/species vs plant's ~0.65°/
// species), so fungi is not shortchanged relative to plant's own new
// density target. This does NOT re-run fungi's own layout logic or touch
// its genus/species positioning — only its total arc WIDTH. If fungi's own
// tree still reads as crowded at 59° that's a separate, not-yet-done pass
// (this task's scope is the plant fan only) — flagging, not fixing.
// Called once per successful data load, before the first layout()/update()
// call for either fan — PLANT_ARC/ARC_START/FUNGI_ARC/FUNGI_ARC_START are
// `let`, not `const`, specifically so this can resize them here.
function _computePlantArcFromGenusSlots(){
  const GENUS_SLOT_UNIT = 0.65 * Math.PI / 180;
  let totalUnits = 0;
  for (const orders of Object.values(RAW.Plantae || {})) {
    if (!_isPlainObject(orders)) continue;
    for (const families of Object.values(orders)) {
      if (!_isPlainObject(families)) continue;
      for (const genera of Object.values(families)) {
        if (!_isPlainObject(genera)) continue;
        for (const species of Object.values(genera)) {
          if (!Array.isArray(species)) continue;
          totalUnits += Math.max(1, species.length);
        }
      }
    }
  }
  if (totalUnits === 0) {
    throw new Error("genus-slot arc computation: zero genera found in live Plantae data — cannot size PLANT_ARC");
  }
  PLANT_ARC = totalUnits * GENUS_SLOT_UNIT;
  ARC_START = -Math.PI/2 - PLANT_ARC/2;
  const GAP = 1.5 * Math.PI/180;  // unchanged convention — see the original disjoint-arcs comment above
  FUNGI_ARC = 2*Math.PI - PLANT_ARC - 2*GAP;
  if (FUNGI_ARC <= 0) {
    throw new Error(`genus-slot arc computation: PLANT_ARC (${(PLANT_ARC*180/Math.PI).toFixed(1)}°, ${totalUnits} genus-slot-units) leaves no room for the fungi fan — GENUS_SLOT_UNIT needs reducing`);
  }
  FUNGI_ARC_START = Math.PI/2 - FUNGI_ARC/2;
}

const svg = d3.select("#tree");
const g = svg.append("g");         // world group (zoom/pan)
const linkG = g.append("g");       // plant fan links
// Persistent species-tier (genus->species) links — always in the DOM at an
// ambient low opacity, independent of genus expand/collapse state (see
// renderSpeciesLinks()). Appended before nodeG so species dots still draw
// on top, matching the existing links-under-nodes stacking per fan.
const speciesLinkG = g.append("g");
const nodeG = g.append("g");       // plant fan nodes
// SHOW_ALL_SPECIES_LABELS: persistent species-tier label layer, same
// independence from expand/collapse as speciesLinkG above (see
// renderSpeciesLabels()). Appended after nodeG so it draws on top of node
// circles/existing labels.
const speciesLabelG = g.append("g");
const fungiLinkG = g.append("g");  // fungi fan links (separate group — no shared parent with plant fan)
const fungiSpeciesLinkG = g.append("g");  // fungi fan persistent species links — same reasoning as speciesLinkG
const fungiNodeG = g.append("g");  // fungi fan nodes
const fungiSpeciesLabelG = g.append("g");  // fungi fan persistent species labels — same reasoning as speciesLabelG
const bucketG = g.append("g");
let W = window.innerWidth, H = window.innerHeight;

const zoom = d3.zoom().scaleExtent([0.3, 4]).on("zoom", e => {
  g.attr("transform", e.transform);
  updateLabelVisibility(nodeG, e.transform.k);
  updateLabelVisibility(fungiNodeG, e.transform.k);
});
svg.call(zoom);
svg.on("mousedown", () => svg.classed("dragging", true));
svg.on("mouseup", () => svg.classed("dragging", false));
// Background click (not a node — node clicks stopPropagation() before this
// can fire) clears any active focus. d3-zoom suppresses the synthetic click
// that would otherwise follow a drag-to-pan gesture, so this doesn't fire
// spuriously mid-pan.
svg.on("click", () => clearFocus());

// ---------------------------------------------------------------------------
// RADIAL layout. Two independent fans meet at a shared centre point: the
// plant fan sweeps the UPPER arc (root at the base, rising up — unchanged),
// the fungi fan sweeps the LOWER arc, mirrored across the horizontal (root
// at the same base point, pointing down). Each fan is its own d3.hierarchy
// with its own root — they do not share a parent node, so folding/collapsing
// one never affects the other.
// Collapsible: default collapsed at genus (species hidden until tapped).
// ---------------------------------------------------------------------------
// Plant and fungi fans use different arc widths so they occupy disjoint
// angular ranges (previously both used the same ~207° arc, which overshot
// the horizontal on both sides and let fungi labels bleed into plant space,
// e.g. Lecanoromycetes/Parmeliaceae appearing on the plant side).
// Plant range:  [-193.5°, 13.5°]  (unwrapped)      →  wraps to [166.5°,360°)∪[0°,13.5°]
// Fungi range:  [15°, 165°]
// → disjoint, with a 1.5° gap on each side (13.5°–15° and 165°–166.5°).
// PLANT_ARC/ARC_START/FUNGI_ARC/FUNGI_ARC_START are `let`, not `const`, as of
// 9 July (v2): the values below are the pre-data-load DEFAULTS only. Once the
// taxonomy data arrives, _computePlantArcFromGenusSlots() (see below) resizes
// PLANT_ARC to fit the genus tier's real per-species slot needs (the budget
// constraint from the earlier 9 July pass was explicitly lifted for this
// work) and shrinks FUNGI_ARC to keep the two fans non-overlapping on the
// same circle — see that function for the full rationale and numbers.
let PLANT_ARC = Math.PI * 1.15;                    // plant canopy spread — default before data loads (~207°)
let ARC_START = -Math.PI/2 - PLANT_ARC/2;          // plant fan: centred on straight-up (recomputed alongside PLANT_ARC)
let FUNGI_ARC = Math.PI * (150/180);                // fungi fan spread — default before data loads (150°)
let FUNGI_ARC_START = Math.PI/2 - FUNGI_ARC/2;     // fungi fan: centred on straight-down (recomputed alongside FUNGI_ARC)
const RING = 200;                           // radial distance per depth level (family/genus/species) — was 150; widened to use canvas space beyond the old tree edge

// Plant fan only: class/order gather into a tight "trunk" near the root —
// reduced radius (TRUNK_RING per tier instead of RING) and angles pulled
// toward the arc's centre (TRUNK_GATHER < 1) — before flaring out to the
// family tier at its original, unmodified position (RING*3, full angle).
// Fungi never gets this (see layout()'s gatherTrunk param) — it stays plain
// spokes at every depth, so the two kingdoms read differently at a glance.
const TRUNK_RING = 230;     // radial distance per trunk tier (class, order) — was 90; widened so ~30 order labels (and 6 class labels) get enough arc-length to stay legible. Now bigger than the RING step itself, so class↔order separation (230) exceeds order↔family separation (600-460=140) — deliberate, legibility at these two crowded tiers takes priority over even spacing.
const TRUNK_GATHER = 0.32;  // 0=all trunk nodes collapse to the centre line, 1=full spoke spread — tune to taste
const FAMILY_RADIUS = 3 * RING;  // family tier's fixed radius (depth 3 × RING) — named so species positioning below can anchor to it directly instead of re-deriving from genus

// EXPERIMENT (trivially revertible — set false to restore byte-for-byte
// prior behaviour): render every species label persistently, independent of
// genus expand/collapse, via a parallel layer (renderSpeciesLabels(), mirrors
// renderSpeciesLinks()). Does not touch _applyFocusStyles(), the g.node join,
// updateLabelVisibility(), or any radius/angle constant.
const SHOW_ALL_SPECIES_LABELS = true;

let rootH;       // plant fan root (d3.hierarchy) — unchanged variable, unchanged meaning
let fungiRootH;  // fungi fan root (d3.hierarchy) — separate tree, separate root
let focusedNode = null;  // currently focused node (either fan), or null — see toggle()/setFocus()/clearFocus() below
// The subtree root that was actually force-expanded by _expandSubtree() —
// NOT always the same node as focusedNode. A genus click force-expands its
// PARENT family (every sibling genus + their species — see toggle()), so
// expandedRoot is the family in that case, while focusedNode stays the
// clicked genus (for zoom/highlight targeting). This is what _collapseExpanded()
// folds back on defocus; collapsing focusedNode alone would leave every
// sibling genus's species permanently expanded — the reported "smeary
// cluster near the trunk" that never clears.
let expandedRoot = null;

const cluster = d3.cluster().separation((a,b) => (a.parent === b.parent ? 1 : 1.6));

const tip = d3.select("#tip");
let confirmedCount = 0;

function colourFor(d){
  if (d.data.fungi) {
    if (d.data.lichen) return "var(--lichen)";       // Lecanoromycetes species only (see buildFungiTree)
    return d.data.rank === "species" ? "var(--fungi)" : "var(--fungi-dim)";
  }
  if (d.data.rank === "species" || d.data.rank === "genus") return "var(--plant-green)";
  if (d.data.rank === "kingdom") return "var(--leaf)";
  return "var(--bark)";  // class/order/family — unchanged
}
function radiusFor(d){
  return d.data.rank==="kingdom" ? 9 : d.data.rank==="family" ? 6.5 : d.data.rank==="genus" ? 5 : 3.6;
}
// map a node's (angle a, radius r) to x,y with the trunk rising upward from base
function project(a, r){ return [ Math.cos(a) * r, Math.sin(a) * r ]; }

// assign radial coords: cluster gives d.x in [0,1]*2π-ish (breadth), d.y depth
// root/arc/arcStart are parameterised so the same layout can drive either fan
// at its own width; called with (rootH, PLANT_ARC, ARC_START, true) the plant
// fan gathers its class/order tiers into a trunk (see gatherTrunk below);
// called with (fungiRootH, FUNGI_ARC, FUNGI_ARC_START, false) the fungi fan
// stays plain spokes at every depth — the two kingdoms read differently.
function layout(root, arc, arcStart, gatherTrunk){
  cluster.size([arc, 1])(root);              // breadth spread across this fan's arc, depth normalised
  const centreX = arc / 2;                   // cluster x-space mid-point (breadth centre)

  // Kingdom/class/order/family/genus — general breadth-cluster layout.
  // Species are deliberately skipped here: their position is set by the one
  // explicit rule below, not by this pass, so there is a single place that
  // decides where a species renders (see that rule for why).
  root.each(d => {
    if (d.data.rank === "species") return;
    if (gatherTrunk && d.depth >= 1 && d.depth <= 2) {
      // class (depth 1) / order (depth 2): pull angle toward centre and use
      // a short, shared trunk radius instead of the normal per-depth ring —
      // an organic gathered bundle rising from the root before family flares
      // out at its usual position. Only the plant fan (gatherTrunk=true)
      // reaches this branch — fungi's class/order use the else branch below,
      // same as every other fungi depth (no trunk gather for fungi).
      d.ang = arcStart + centreX + (d.x - centreX) * TRUNK_GATHER;
      d.rad = d.depth * TRUNK_RING;          // 230 (class) / 460 (order)
    } else {
      d.ang = arcStart + d.x;                // canopy angle — unchanged formula
      d.rad = d.depth === 0 ? 0 : d.depth * RING;
    }
    const [px,py] = project(d.ang, d.rad);
    d.px = px; d.py = py;                     // screen coords (y negative = up)
  });

  // ---------------------------------------------------------------------
  // CLASS-TIER ANGULAR REDISTRIBUTION (plant fan only, confirmed 8 July).
  // Magnoliopsida (212 genera) dominates the leaf-count-weighted cluster
  // layout above, squeezing Polypodiopsida/Liliopsida/Pinopsida/
  // Florideophyceae/Bryopsida into ~9° of arc while ~16° between
  // Magnoliopsida and Polypodiopsida sits empty. Fix: hold the two
  // outermost class labels (Magnoliopsida, Bryopsida) at whatever d.ang
  // the general formula above already gave them — read here, not
  // recomputed, so they are genuinely unchanged — and evenly re-space the
  // four interior ones between them. d.rad (still depth*TRUNK_RING) and
  // every other rank/tier are untouched; this only overwrites d.ang (and
  // the px/py it feeds) for these four named class nodes.
  // ---------------------------------------------------------------------
  if (gatherTrunk) {
    const REDISTRIBUTE = ["Polypodiopsida", "Liliopsida", "Pinopsida", "Florideophyceae"];
    const classNodes = root.children || [];
    const leftAnchor = classNodes.find(d => d.data.name === "Magnoliopsida");
    const rightAnchor = classNodes.find(d => d.data.name === "Bryopsida");
    // Fail loud, not silent: a missing locked anchor previously just
    // skipped this block with no visible effect, which would have hidden a
    // real data/name-drift bug behind "the redistribution just didn't run."
    if (!leftAnchor || !rightAnchor) {
      throw new Error(`class-tier redistribution: locked anchor not found in live data (Magnoliopsida found=${!!leftAnchor}, Bryopsida found=${!!rightAnchor})`);
    }
    const step = (rightAnchor.ang - leftAnchor.ang) / (REDISTRIBUTE.length + 1);
    REDISTRIBUTE.forEach((name, i) => {
      const node = classNodes.find(d => d.data.name === name);
      if (!node) {
        throw new Error(`class-tier redistribution: interior class node "${name}" not found in live data`);
      }
      node.ang = leftAnchor.ang + step * (i + 1);
      const [px, py] = project(node.ang, node.rad);
      node.px = px; node.py = py;
    });
  }

  // ---------------------------------------------------------------------
  // ORDER-TIER MINIMUM-GAP ENFORCEMENT (plant fan only, confirmed 8 July).
  // Unlike class tier, order tier is NOT evenly redistributed — most of it
  // (Rosales/Lamiales/Asterales and the rest of the front half) already
  // has healthy, density-proportional spacing that would be destroyed by
  // a uniform reflow. Instead: isotonic regression via pool-adjacent-
  // violators (PAVA) — the standard, minimal-total-movement way to
  // enforce "every consecutive gap >= MIN_ORDER_GAP" in 1D. Concretely:
  // transform each sorted node's angle to q_i = ang_i - i*MIN_ORDER_GAP,
  // fit the largest non-decreasing (isotonic) curve through q that
  // minimises total squared deviation, then map back via
  // ang_i = fitted_i + i*MIN_ORDER_GAP. Any node whose neighbours already
  // satisfied the minimum is provably left at its EXACT original angle —
  // this only ever pushes nodes apart by the real shortfall, propagating
  // to the next neighbour only when a push would itself cause a new
  // collision (that's what "pooling" a violation into a block does).
  // MIN_ORDER_GAP = 1° is grounded in the live data: the tightest
  // pairwise gap that read clean with no overlap (confirmed 8 July) was
  // Boraginales→Gentianales at 1.088°, rounded down slightly for margin.
  // The back portion of the order tier (Malpighiales through
  // Orthotrichales) is genuinely dense in the real data — many pairwise
  // gaps as low as 0.358° — so holding even this modest 1° floor pools
  // ~29 of 40 nodes into one cascading block; that's the real data's
  // density, not the algorithm redistributing more than it needs to. The
  // front ~15 nodes (Rosales through Dipsacales) stay untouched.
  // d.rad (still depth*TRUNK_RING) is untouched throughout.
  // ---------------------------------------------------------------------
  if (gatherTrunk) {
    const MIN_ORDER_GAP = Math.PI / 180;  // 1°, see rationale above
    const classNodesForOrder = root.children || [];
    const orderNodes = classNodesForOrder
      .flatMap(c => c.children || [])
      .filter(d => d.data.rank === "order");
    orderNodes.sort((a, b) => a.ang - b.ang);
    const n = orderNodes.length;
    if (n > 0) {
      const q = orderNodes.map((d, i) => d.ang - i * MIN_ORDER_GAP);
      const stack = [];  // pooled blocks: {avg, w (count), start (index)}
      for (let i = 0; i < n; i++) {
        let avg = q[i], w = 1, start = i;
        while (stack.length && stack[stack.length - 1].avg > avg) {
          const p = stack.pop();
          avg = (avg * w + p.avg * p.w) / (w + p.w);
          w += p.w;
          start = p.start;
        }
        stack.push({ avg, w, start });
      }
      const fitted = new Array(n);
      for (const blk of stack) {
        for (let j = blk.start; j < blk.start + blk.w; j++) fitted[j] = blk.avg;
      }
      orderNodes.forEach((d, i) => {
        d.ang = fitted[i] + i * MIN_ORDER_GAP;
        const [px, py] = project(d.ang, d.rad);
        d.px = px; d.py = py;
      });
    }
  }

  // ---------------------------------------------------------------------
  // GENUS-TIER SLOT-BASED LAYOUT (plant fan only, confirmed 9 July — v2,
  // supersedes the same-day min-gap fix below).
  // The min-gap approach (PAVA, matching order tier's pattern) hit a hard
  // ceiling: genus spacing is uniform EVERYWHERE in the live data (no
  // "mostly fine, some dense spots" pattern to exploit, unlike order
  // tier), so any minimum large enough to matter pooled the ENTIRE genus
  // tier into one cascading block — in effect a uniform reflow, which is
  // exactly what this work was told not to do. That pass stayed within
  // the then-locked 207° PLANT_ARC and could only manage a ~15% arc-length
  // improvement — not enough to stop real overlap. The budget constraint
  // is now lifted, so genus position is computed directly from cumulative
  // SLOT WIDTH instead of nudging a d3.cluster-derived starting point:
  // each genus gets a slot of GENUS_SLOT_UNIT * max(1, species_count) —
  // same unit and same total used to size PLANT_ARC itself in
  // _computePlantArcFromGenusSlots(), so slots exactly tile the arc with
  // no leftover and no overflow — walked in the SAME class->order->family
  // document order buildTree() uses (a manual depth-first walk, not
  // root.each(), which is breadth-first and would scramble that order).
  // Each genus is centred within its own slot; its species are fanned
  // entirely WITHIN that same slot (see the species-positioning block
  // below) — by construction, no genus's species fan can ever reach into
  // a neighbouring genus's slot. That eliminates the reported crossing,
  // it doesn't just reduce it.
  // Overwrites the general loop's cluster-x-derived d.ang for genus nodes
  // only (same established pattern as class/order tier's own overrides).
  // Does NOT touch d.rad (still depth*RING = 800) or any other rank/tier.
  // ---------------------------------------------------------------------
  if (gatherTrunk) {
    const GENUS_SLOT_UNIT = 0.65 * Math.PI / 180;  // must match _computePlantArcFromGenusSlots()
    let cursor = arcStart;
    let genusCount = 0;
    const _walkGenusSlots = (node) => {
      if (node.data.rank === "genus") {
        const species = node.children || node._children || [];
        const slotWidth = GENUS_SLOT_UNIT * Math.max(1, species.length);
        node.ang = cursor + slotWidth / 2;
        node._slotStart = cursor;
        node._slotWidth = slotWidth;
        cursor += slotWidth;
        genusCount++;
        const [px, py] = project(node.ang, node.rad);
        node.px = px; node.py = py;
        return;
      }
      (node.children || node._children || []).forEach(_walkGenusSlots);
    };
    _walkGenusSlots(root);
    if (genusCount === 0) {
      throw new Error("genus-tier slot layout: no genus nodes reached by the document-order walk — plant fan should never be empty here");
    }
  }

  // ---------------------------------------------------------------------
  // SPECIES POSITIONING — the one and only rule for species-rank nodes.
  // Runs after the pass above, so every species' parent genus already has
  // its final ang/rad (and, for the plant fan, its _slotStart/_slotWidth).
  // At a single FIXED radius — FAMILY_RADIUS + 2*RING (5*RING total) — not
  // derived from the genus's own radius. Genus sits at 4*RING, so this is
  // always one full RING step further out than genus: clearly further
  // out, never inward, never piled at the genus's point, and immune to any
  // future per-genus radius drift since it no longer reads d.parent.rad.
  // This is the only code in the file that sets a species' ang/rad/px/py.
  //
  // Two formulas, branched on gatherTrunk (i.e. which fan is being laid
  // out), NOT two separate code paths through layout() — the same
  // root.each() call and the same function drive both fans, exactly as
  // before:
  //  - plant fan: species-tier slot-based fan (confirmed 9 July v2) —
  //    evenly fills the genus's own [_slotStart, _slotStart+_slotWidth]
  //    window from the block above, so a genus's species can never spill
  //    into a neighbouring genus's slot.
  //  - fungi fan: the ORIGINAL fixed-FAN formula (confirmed 9 July v1),
  //    completely unchanged, byte-for-byte — the slot rework is plant-fan
  //    scope only; fungi's own genus/species positions and their own
  //    crowding (if any) are untouched and unverified by this pass.
  //
  // Walks from the GENUS side (d.children || d._children) rather than
  // relying on root.each() to organically reach species nodes — genus is
  // always reachable via .children (never collapsed itself), but a
  // COLLAPSED genus's species live in ._children, invisible to a plain
  // root.each() species-side walk. Confirmed 9 July: needed so persistent
  // species-links (see renderSpeciesLinks()) have a valid position for
  // every species even while its genus dot is collapsed.
  // ---------------------------------------------------------------------
  root.each(d => {
    if (d.data.rank !== "genus") return;
    const species = d.children || d._children || [];
    const n = species.length;
    if (gatherTrunk) {
      // plant fan: fill the genus's own slot, species centred within their
      // own 1/n-th share of it — guarantees containment within the slot.
      species.forEach((sp, i) => {
        sp.ang = d._slotStart + d._slotWidth * (i + 0.5) / n;
        sp.rad = FAMILY_RADIUS + 2 * RING;
        const [px, py] = project(sp.ang, sp.rad);
        sp.px = px; sp.py = py;
      });
    } else {
      // fungi fan: unchanged, original fixed-total-spread formula.
      const FAN = 0.12; // total angular spread (radians) across sibling species
      species.forEach((sp, i) => {
        sp.ang = d.ang + (n > 1 ? (i - (n - 1) / 2) * (FAN / (n - 1)) : 0);
        sp.rad = FAMILY_RADIUS + 2 * RING;
        const [px, py] = project(sp.ang, sp.rad);
        sp.px = px; sp.py = py;
      });
    }
  });

  // ---------------------------------------------------------------------
  // FAMILY-TIER RECENTER (plant fan only, confirmed 9 July — v3).
  // Runs after genus slots and species positions above are both final.
  // Checked against live data before writing this: genus.ang already
  // equals the exact midpoint of its own species' angle span (0.000000°
  // offset, every genus, by construction of the slot formula) — the
  // genus<->species relationship needed no fix. The real mismatch is one
  // level up: FAMILY still sits wherever the general loop's cluster-x
  // formula placed it (mean of PRE-slot leaf positions, meaningless now
  // that genus abandoned cluster-x for slot-based placement) while its
  // genus children moved to their new slot positions. Confirmed against
  // the live tree: 81 of 84 plant families are off by more than 1° from
  // their own genus children's span midpoint, up to -27°
  // (Ranunculaceae/Papaveraceae/Fabaceae; Ericaceae itself is -11.36°) —
  // this, not genus<->species, is what makes family->genus links sweep
  // across neighbouring genera and read as crossing.
  // SCOPE: FAMILY ONLY — deliberately does NOT propagate to order/class,
  // despite "recenter" suggesting a full post-order pass. Checked and
  // confirmed: order and class have their OWN deliberate, hand-tuned 8
  // July positions — class is evenly redistributed between two locked
  // anchors (Magnoliopsida/Bryopsida), order is minimum-gap PAVA — neither
  // was ever "mean of its children" by design. Recentering them would
  // silently overwrite that confirmed-working output; the ~18°/~100°
  // "offsets" measured there during recon are evidence those fixes are
  // doing their job, not a bug. Reported, not overridden.
  // Does NOT touch d.rad (still depth*RING = 600) or any genus/species
  // slot value set above.
  // ---------------------------------------------------------------------
  if (gatherTrunk) {
    root.each(d => {
      if (d.data.rank !== "family") return;
      const genera = d.children || d._children || [];
      if (genera.length === 0) {
        throw new Error(`family-tier recenter: family "${d.data.name}" has no genus children — cannot recenter`);
      }
      const angs = genera.map(g => g.ang);
      d.ang = (Math.min(...angs) + Math.max(...angs)) / 2;
      const [px, py] = project(d.ang, d.rad);
      d.px = px; d.py = py;
    });
  }
}

// organic radial limb: quadratic through a mid-radius control point
function limb(s, t){
  const midR = (s.rad + t.rad)/2;
  const midA = (s.ang + t.ang)/2;
  const [c1x,c1y] = project(s.ang, midR);
  const [c2x,c2y] = project(t.ang, midR);
  return `M${s.px},${s.py} C${c1x},${c1y} ${c2x},${c2y} ${t.px},${t.py}`;
}

// Persistent species-tier (genus->species) links — confirmed 9 July,
// deliberate design change: these are ALWAYS in the DOM at DIM_OPACITY,
// independent of whether their genus is expanded or collapsed (unlike
// every other tier's links, which still enter/exit with update()'s main
// join below). Species DOTS/LABELS are untouched — they still only render
// while their genus is expanded, exactly as before; only the LINK is
// persistent. Reads every genus's species from d.children || d._children
// (both, since layout()'s species-positioning pass above now computes
// valid ang/rad/px/py for every species regardless of collapse state) so
// a link can always be drawn even when the species dot itself is hidden.
// The species list itself never changes at runtime, so after the first
// call this is effectively update-only (position via the "speciesLinkMove"
// transition) — enter/exit fire once each, if ever.
// This also structurally closes the recurring unnamed-transition-residue
// bug for this tier: species links never exit the DOM on collapse/
// deselect, so they can't get stuck mid-exit-transition.
function renderSpeciesLinks(root, gatherTrunk){
  const sel = gatherTrunk ? speciesLinkG : fungiSpeciesLinkG;
  const speciesLinks = [];
  root.each(d => {
    if (d.data.rank !== "genus") return;
    (d.children || d._children || []).forEach(sp => speciesLinks.push({ source: d, target: sp }));
  });
  const strokeFor = d => Math.max(0.9, 6.5 - d.target.depth * 1.4);  // same floor as the main link join
  const link = sel.selectAll("path.link").data(speciesLinks, d => d.target.data.name + d.target.depth);
  link.enter().append("path").attr("class","link")
      .attr("d", d => limb(d.source, d.target))
      .attr("stroke-width", strokeFor)
      .attr("stroke", d => d.target.data.fungi ? "var(--fungi-dim)" : null)
      .style("opacity", SPECIES_LINK_REST_OPACITY)  // ambient rest state — _applyFocusStyles() takes over on any focus change
    .merge(link).transition("speciesLinkMove").duration(450)
      .attr("d", d => limb(d.source, d.target));
  link.exit().remove();  // should not fire in practice — species list is static after load
}

// SHOW_ALL_SPECIES_LABELS experiment: persistent species-tier label layer,
// mirroring renderSpeciesLinks() immediately above as closely as possible —
// same collection logic (every genus's species, from d.children||d._children
// so collapsed genera still contribute), same call site/cadence in update()
// (so it re-syncs whenever the link layer does), same pre-computed px/py/ang
// that layout() already produces for every species regardless of collapse
// state. Deliberately does NOT go through _applyFocusStyles(), the g.node
// join, or updateLabelVisibility() — a separate layer, so none of those are
// touched. No transition on reposition (snap), per spec — unlike the
// speciesLinkMove transition above. Text content/rotation/text-anchor math
// copied verbatim from the main label pass in update() (~line 886), just
// flattened to include the translate(px,py) a g.node's own transform would
// otherwise have supplied.
function renderSpeciesLabels(root, gatherTrunk){
  const sel = gatherTrunk ? speciesLabelG : fungiSpeciesLabelG;
  if (!SHOW_ALL_SPECIES_LABELS) { sel.selectAll("text.node-label").remove(); return; }
  const speciesNodes = [];
  root.each(d => {
    if (d.data.rank !== "genus") return;
    (d.children || d._children || []).forEach(sp => speciesNodes.push(sp));
  });
  const label = sel.selectAll("text.node-label").data(speciesNodes, d => d.data.name + d.depth);
  label.enter().append("text").attr("class",d=>"node-label rank-"+d.data.rank)
      .attr("dy","0.32em")
      .text(d=>d.data.name.split(" ").slice(1).join(" "))
      .style("opacity",1)
    .merge(label)
      .attr("transform", d=>{
        const deg = d.ang * 180/Math.PI;
        const off = radiusFor(d)+6;
        return `translate(${d.px},${d.py}) rotate(${deg}) translate(${off},0) ${ (deg>90||deg<-90) ? "rotate(180)" : "" }`;
      })
      .attr("text-anchor", d=>{
        const deg = d.ang*180/Math.PI;
        return (deg>90||deg<-90) ? "end" : "start";
      });
  label.exit().remove();  // should not fire in practice — species list is static after load
}

// root/arc/arcStart/gatherTrunk/linkSel/nodeSel are parameterised so the exact
// same function drives both fans. Calling
// update(source, rootH, PLANT_ARC, ARC_START, true, linkG, nodeG) reproduces
// the plant fan (with the trunk gather); the fungi fan is rendered by calling
// this same function with fungiRootH, FUNGI_ARC, FUNGI_ARC_START, false,
// fungiLinkG, fungiNodeG instead — separate D3 selections, so the two fans'
// data-joins never touch each other (no shared parent).
function update(source, root, arc, arcStart, gatherTrunk, linkSel, nodeSel){
  layout(root, arc, arcStart, gatherTrunk);
  renderSpeciesLinks(root, gatherTrunk);
  renderSpeciesLabels(root, gatherTrunk);
  const nodes = root.descendants();
  // genus->species edges are handled exclusively by renderSpeciesLinks()
  // above (persistent, not collapse-gated) — excluded here so they're
  // never double-drawn between this join and that one.
  const links = root.links().filter(d => d.target.data.rank !== "species");
  const strokeFor = d => Math.max(0.9, 6.5 - d.target.depth * 1.4);

  const link = linkSel.selectAll("path.link").data(links, d => d.target.data.name + d.target.depth);
  link.enter().append("path").attr("class","link")
      .attr("d", d => limb({ang:source.ang0??d.source.ang, rad:source.rad0??d.source.rad, px:source.px0??d.source.px, py:source.py0??d.source.py},
                            {ang:source.ang0??d.source.ang, rad:source.rad0??d.source.rad, px:source.px0??d.source.px, py:source.py0??d.source.py}))
    .merge(link).transition("linkMove").duration(450)
      .attr("d", d => limb(d.source, d.target)).attr("stroke-width", strokeFor)
      .attr("stroke", d => d.target.data.fungi ? "var(--fungi-dim)" : null);
  // Named "linkExit" (same reasoning as "nodeMove"/"focusFade" below): this
  // is the one transition on path.link that was still on the default
  // namespace, sharing a slot with _applyFocusStyles()'s "focusFade"
  // opacity transition on the same elements (it runs right after collapse,
  // touching every currently-rendered link). Confirmed live 9 July: stray
  // species nodes/links survived a genus deselect instead of exiting —
  // giving this its own namespace means .remove() can no longer be
  // silently cancelled by anything else that later touches these elements.
  link.exit().transition("linkExit").duration(300).attr("stroke-opacity",0).remove();

  const node = nodeSel.selectAll("g.node").data(nodes, d => d.data.name + d.depth);
  const nEnter = node.enter().append("g").attr("class","node")
      .attr("transform", `translate(${source.px0??source.px},${source.py0??source.py})`)
      .on("click",(e,d)=>{
        e.stopPropagation();
        if (d.data.rank === "species") { openSpeciesPopup(d, e); return; }
        if (d._children||d.children) toggle(d, root, arc, arcStart, gatherTrunk, linkSel, nodeSel);
      })
      .on("mousemove",(e,d)=>showTip(e,d)).on("mouseleave",hideTip);

  nEnter.append("circle").attr("class","node-circle").attr("r",0)
      .attr("fill",colourFor).attr("stroke","var(--bg)").attr("stroke-width",1.5);
  nEnter.append("circle").attr("class","collapsed-ring").attr("r",0).attr("stroke","var(--bark)");
  nEnter.append("text").attr("class",d=>"node-label rank-"+d.data.rank)
      .attr("dy","0.32em")
      .text(d=>d.data.rank==="species" ? d.data.name.split(" ").slice(1).join(" ") : d.data.name)
      .style("opacity",0);

  const nMerge = nEnter.merge(node);
  // Named "nodeMove": D3 interrupts any existing transition in the SAME
  // (element, namespace) slot when a new one starts there. _applyFocusStyles()
  // also runs a .transition() on these same <g class="node"> elements (for
  // opacity), immediately after update() returns, inside setFocus()/clearFocus().
  // Both used the default unnamed namespace, so the opacity transition was
  // interrupting this transform transition before it ever reached {d.px,d.py}
  // — confirmed via a DOM-vs-computed-position check (species nodes froze at
  // a stale, near-genus position instead of their correct far-out radius).
  // Naming this transition puts it in its own namespace so it can no longer
  // be cut off by _applyFocusStyles()'s opacity transition (named "focusFade"
  // there, for the same reason).
  nMerge.transition("nodeMove").duration(450).attr("transform", d=>`translate(${d.px},${d.py})`);
  nMerge.select("circle.node-circle").transition().duration(450).attr("r",radiusFor).attr("fill",colourFor);
  nMerge.select("circle.collapsed-ring").transition().duration(450)
      .attr("r",d=>d._children?radiusFor(d)+4:0).attr("stroke-opacity",d=>d._children?0.6:0);
  // labels: rotate to follow the radial angle, flip on the left half for legibility.
  // Opacity is skipped here for order rank only — its visibility is owned by
  // updateLabelVisibility() (zoom-conditional), not this fixed-1 transition.
  // Class tier is evenly spaced (~5.2° apart) now, so there's no crowding
  // left to gate against — it gets the same unconditional opacity as every
  // other rank here (confirmed 8 July).
  // Named "labelOpacity": same interruption hazard as nodeMove/focusFade above
  // — this and the fill/transform transition below both run on the same <text>
  // elements: two unnamed transitions in the same slot cancel each other,
  // silently dropping the opacity:1 target and leaving every label stuck at
  // its nEnter initial opacity:0 (confirmed live — this was the actual cause
  // of "every label blanked" reported 8 July, not the class-tier redistribution).
  nMerge.select("text").filter(d => d.data.rank!=="order")
      .transition("labelOpacity").duration(450).style("opacity",1);
  nMerge.select("text").transition().duration(450)
      .style("fill", d => {
        if (!d.data.fungi) return null;
        // class/order/family: don't override — let the existing
        // .node-label.rank-class/.rank-order/.rank-family CSS rules apply.
        // Those selectors key on rank only (not fungi), so this reuses the
        // exact same --ink-class/--ink-order/--ink-family tints already
        // shipped for the plant side (confirmed 9 July) — same rank, same
        // colour, in either kingdom. Kingdom/genus/species text (not in
        // scope for this change) keep the existing flat --fungi-dim.
        if (d.data.rank === "class" || d.data.rank === "order" || d.data.rank === "family") return null;
        return "var(--fungi-dim)";
      })
      .attr("transform", d=>{
        if (d.depth===0) return "translate(0,20)";
        const deg = d.ang * 180/Math.PI;
        const off = radiusFor(d)+6;
        return `rotate(${deg}) translate(${off},0) ${ (deg>90||deg<-90) ? "rotate(180)" : "" }`;
      })
      .attr("text-anchor", d=>{
        if (d.depth===0) return "middle";
        const deg = d.ang*180/Math.PI;
        return (deg>90||deg<-90) ? "end" : "start";
      });
  updateLabelVisibility(nodeSel, d3.zoomTransform(svg.node()).k);

  // Named "nodeExit" — same reasoning as "linkExit" above: this was the
  // one transition on g.node still on the default namespace, sharing a
  // slot with _applyFocusStyles()'s "focusFade" opacity transition, which
  // runs on every currently-rendered node immediately after a collapse.
  // Confirmed live 9 July: stray species nodes survived a genus deselect
  // instead of exiting. Own namespace means .remove() can't be silently
  // cancelled by anything else touching these elements.
  const nExit = node.exit().transition("nodeExit").duration(300)
      .attr("transform",`translate(${source.px},${source.py})`).remove();
  nExit.select("circle").attr("r",0);
  nExit.select("text").style("opacity",0);

  nodes.forEach(d=>{ d.ang0=d.ang; d.rad0=d.rad; d.px0=d.px; d.py0=d.py; });
}

// Zoom-conditional visibility for the order tier only (class tier is
// evenly spaced now and gets unconditional opacity in update() above;
// family/genus/species text is untouched too — always opacity 1).
// Sort order-rank rendered <text> nodes by angle and derive each one's
// available angular gap from its nearest neighbours at the same rank
// (midpoint-to-midpoint; a one-sided gap at either end of the sorted
// list, since there's no neighbour beyond it). Arc-length-per-label at the
// CURRENT zoom scale is d.rad (world-space radius, unaffected by zoom) ×
// gap (radians, also world-space — angles don't change with zoom) × k
// (screen-space zoom factor) — this grows as you zoom in, while the label's
// rendered width (getComputedTextLength(), local/world units, unaffected by
// the ancestor zoom transform) stays fixed. So the same label starts hidden
// (arc-length too small) and clears the threshold as k increases. Does not
// read/write d.ang or d.rad — visibility only, no layout changes.
//
// ORDER_LABEL_VIS_BOOST: scaleExtent caps k at 4, which — checked against
// the live data — leaves the order tier's mostly-sub-2° gaps unable to
// clear their own label width until very late zoom, if ever. A pure
// multiplier on this side of the comparison only (not on scaleExtent, not
// on geometry) keeps the same "starts hidden, reveals on zoom" behaviour
// but gives real headroom: ×6 gets a clear majority (29/40) clearing by
// moderate zoom (k=2.0), while the initial ~k0.7 view stays reasonably
// uncluttered (~11/40, still mostly ≥2°-gap labels, not the crowded
// cluster) — and correctly leaves the genuinely-sub-0.7°-gap order cluster
// (e.g. Cornales/Santalales/Vitales/Orthotrichales) hidden even at k=4,
// which is the actual crowding this feature exists to prevent.
// Caveat (pre-existing, not introduced by this tuning): text here isn't
// counter-scaled, so a label's rendered width and its real arc-gap grow
// at the same rate with zoom — the boost doesn't create real extra room,
// it only shifts when the threshold trips. A label whose true width
// already exceeds its true gap will still visually crowd its neighbour
// once revealed, at whatever k that happens to be. Fixing that for real
// needs counter-scaled text, out of scope for a threshold-only change.
const ORDER_LABEL_VIS_BOOST = 6;
function updateLabelVisibility(nodeSel, k){
  for (const rank of ["order"]) {
    const boost = ORDER_LABEL_VIS_BOOST;
    const items = [];
    nodeSel.selectAll(`text.rank-${rank}`).each(function(d){ items.push({ d, el:this }); });
    items.sort((a,b) => a.d.ang - b.d.ang);
    items.forEach((item,i) => {
      const prev = items[i-1], next = items[i+1];
      let gap;
      if (prev && next) gap = (next.d.ang - prev.d.ang) / 2;
      else if (next) gap = next.d.ang - item.d.ang;
      else if (prev) gap = item.d.ang - prev.d.ang;
      else gap = Math.PI;
      const arcLen = item.d.rad * Math.max(gap, 0) * k * boost;
      const labelW = item.el.getComputedTextLength();
      const visible = labelW <= arcLen;
      d3.select(item.el).transition("labelVis").duration(150)
          .style("opacity", visible ? 1 : 0);
    });
  }
}

// Focus is keyed on IDENTITY (is `d` the currently-focused node), not on raw
// open/closed state — a node's own children/_children can already be open
// because an ANCESTOR's focus force-expanded it (see _expandSubtree below),
// so "is d.children truthy" is not the same question as "did the user just
// click d to focus it". Using expand-state as the focus signal caused a bug:
// clicking a genus already opened by its parent family's focus would
// collapse it and clear focus instead of zooming in further on it.
//
// So: clicking the node that's ALREADY focused is a genuine "click it again"
// — delegate to clearFocus(), which collapses it back down (see clearFocus()
// below). Clicking anything else focuses it: ensure it's open (expand if
// collapsed; leave as-is if an ancestor already opened it), force-expand
// family/genus subtrees so species pop into view, then focus. Species never
// reach here: the click handler only calls toggle() when
// d._children||d.children is truthy, never true for a leaf.
function toggle(d, root, arc, arcStart, gatherTrunk, linkSel, nodeSel){
  if (focusedNode === d) {
    // clearFocus() now owns collapsing the expanded scope back down (see
    // below) — delegate rather than duplicate that logic here.
    clearFocus();
    return;
  }

  // Retract whatever the PREVIOUS focus force-expanded before expanding the
  // new target — otherwise switching focus from A to B just adds B's
  // expansion on top of A's, which is never cleaned up (the accumulating
  // "smeary cluster" bug: every family/genus ever clicked stays expanded
  // forever, just dimmed once focus moves elsewhere).
  _collapseExpanded();

  if (d._children) { d.children = d._children; d._children = null; }

  if (d.data.rank === "family") {
    _expandSubtree(d);
    expandedRoot = d;
  } else if (d.data.rank === "genus" && d.parent) {
    // Genus click reveals every species across the WHOLE family (every
    // sibling genus too, not just this one) — a genus click means "show me
    // everything in this family." Focus/zoom still targets the clicked genus
    // specifically (setFocus(d) below), so the view is tight on it while the
    // rest of the now-expanded family sits dimmed in the background, ready
    // to click into. d.parent is the family: genus's direct parent in the
    // hierarchy built by buildTree()/buildFungiTree(). expandedRoot tracks
    // the FAMILY here (what was actually force-expanded), not the genus.
    _expandSubtree(d.parent);
    expandedRoot = d.parent;
  } else {
    // class/order: nothing force-expanded beyond the plain un-collapse
    // above, but still track d itself so a later re-click/defocus can fold
    // it back down (matches the old single-level collapse behaviour these
    // ranks always had).
    expandedRoot = d;
  }

  update(d, root, arc, arcStart, gatherTrunk, linkSel, nodeSel);
  setFocus(d);
}

// Recursively expand every collapsed descendant (and the node itself if it
// was still collapsed) — used only for the family/genus "pop out" case above.
function _expandSubtree(d){
  if (d._children) { d.children = d._children; d._children = null; }
  if (d.children) d.children.forEach(_expandSubtree);
}

// true if `node` is `ancestor` itself or a descendant of it (walks .parent).
function _isDescendantOrSelf(node, ancestor){
  let cur = node;
  while (cur) { if (cur === ancestor) return true; cur = cur.parent; }
  return false;
}

// Full opacity + a brighter outline on the focused node for the focused
// subtree (or everything, when focusedNode is null); reduced opacity for
// everything else, across BOTH fans — "everything not in that subtree"
// includes the other kingdom's fan entirely, per spec.
// Every node's fill AND stroke/stroke-width are explicitly re-applied here
// on every call (not just opacity) — when focusedNode is null (cleared),
// this unconditionally restores every circle to its plain colourFor() fill
// and default stroke, so no node is left painted with the focus highlight.
// Named "focusFade" so this opacity transition runs in its own D3 transition
// namespace, separate from update()'s "nodeMove"/"linkMove" position
// transitions on these same elements — otherwise starting this transition
// interrupts an in-flight position transition (same default namespace =
// same slot per element), freezing nodes at a stale, never-reached position.
// Confirmed via a DOM-vs-computed-position check: species froze near their
// genus instead of reaching their correct far-out radius.
// Opacity tiers: FULL for the focused node, its descendants, AND its full
// ancestor path up to the kingdom root (confirmed 9 July — a click should
// show "how did we get here", not just "what's under here"); DIM for
// everything else; SIBLING (midpoint of the two, not a new hardcoded
// value) for the focused node's own siblings — other children of the
// SAME immediate parent — AND their full subtrees (confirmed 9 July: a
// sibling genus's species inherit the same intermediate tier as the
// sibling genus itself, the same way FULL already propagates down the
// focused node's own subtree — "nearest highlighted ancestor is a
// sibling" reads as intermediate all the way down). Sibling tier is
// intentionally NOT extended to ancestors' siblings (e.g. other families
// under the focused genus's order stay DIM, not intermediate) — only the
// clicked node's own immediate siblings (and what's under them) get that
// treatment, per spec.
// _isDescendantOrSelf(d, focusedNode) covers "d is focusedNode or below
// it"; _isDescendantOrSelf(focusedNode, d) — same function, swapped
// args — covers "focusedNode is below d", i.e. d is an ANCESTOR of
// focusedNode. Together they cover the whole path: self, descendants,
// and ancestors.
const FULL_OPACITY = 1, DIM_OPACITY = 0.15;
const SIBLING_OPACITY = (FULL_OPACITY + DIM_OPACITY) / 2;
// Ambient at-rest opacity for the persistent species-link layer ONLY — a
// dedicated constant (not DIM_OPACITY, which is shared tree-wide) so the
// genus->species connectors can sit slightly brighter at rest without
// touching any other tier's dimming or the SIBLING_OPACITY derivation.
// Used in exactly two places: renderSpeciesLinks()'s enter (governs initial
// load) and the !focusedNode rest-branch of speciesLinkOpacity() below
// (governs rest after any focus/clear). Focus BRIGHTENING is unchanged —
// links still jump to FULL_OPACITY/SIBLING_OPACITY when targeted.
const SPECIES_LINK_REST_OPACITY = 0.25;  // was DIM_OPACITY (0.15); +0.1 step
function _applyFocusStyles(){
  const inFocus = d => !focusedNode || _isDescendantOrSelf(d, focusedNode) || _isDescendantOrSelf(focusedNode, d);
  // "d is at-or-under some OTHER direct child of focusedNode's parent" —
  // reuses _isDescendantOrSelf(d, sib) per sibling, so a sibling's own
  // descendants (not just the sibling node itself) qualify.
  const isInSiblingSubtree = d => {
    if (!focusedNode || !focusedNode.parent) return false;
    const siblings = focusedNode.parent.children || [];
    return siblings.some(sib => sib !== focusedNode && _isDescendantOrSelf(d, sib));
  };
  const tierOpacity = d => inFocus(d) ? FULL_OPACITY : (isInSiblingSubtree(d) ? SIBLING_OPACITY : DIM_OPACITY);
  // Species-links have a different REST value: every other tier's "no
  // focus at all" state is FULL_OPACITY (inFocus() returns true for
  // everyone when focusedNode is null — "show everything at rest"), but
  // species-links are meant to sit at the ambient SPECIES_LINK_REST_OPACITY
  // even at rest, per spec — only actual bright/intermediate targeting should
  // raise them above that. Same bright/intermediate logic otherwise.
  const speciesLinkOpacity = d => {
    if (!focusedNode) return SPECIES_LINK_REST_OPACITY;
    return inFocus(d) ? FULL_OPACITY : (isInSiblingSubtree(d) ? SIBLING_OPACITY : DIM_OPACITY);
  };
  [nodeG, fungiNodeG].forEach(sel => {
    sel.selectAll("g.node").transition("focusFade").duration(300)
      .style("opacity", tierOpacity);
    sel.selectAll("g.node").select("circle.node-circle")
      .attr("fill", colourFor)
      .attr("stroke", d => (focusedNode && d === focusedNode) ? "var(--ink)" : "var(--bg)")
      .attr("stroke-width", d => (focusedNode && d === focusedNode) ? 3 : 1.5);
  });
  [linkG, fungiLinkG].forEach(sel => {
    sel.selectAll("path.link").transition("focusFade").duration(300)
      .style("opacity", d => tierOpacity(d.target));
  });
  [speciesLinkG, fungiSpeciesLinkG].forEach(sel => {
    sel.selectAll("path.link").transition("focusFade").duration(300)
      .style("opacity", d => speciesLinkOpacity(d.target));
  });
}

// Pan+zoom the viewport (existing d3.zoom transform — geometry itself is
// never recomputed) so the focused subtree's bounding box, in the same
// world-space px/py coordinates layout() already assigned, fits on screen.
function _zoomToFit(node){
  const nodes = node.descendants();
  let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
  nodes.forEach(d => {
    minX = Math.min(minX, d.px); maxX = Math.max(maxX, d.px);
    minY = Math.min(minY, d.py); maxY = Math.max(maxY, d.py);
  });
  const pad = 80;
  const bw = Math.max(1, (maxX - minX) + pad*2);
  const bh = Math.max(1, (maxY - minY) + pad*2);
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const scale = Math.min(4, Math.max(0.3, Math.min(W / bw, H / bh)));
  const t = d3.zoomIdentity.translate(W/2 - cx*scale, H/2 - cy*scale).scale(scale);
  svg.transition().duration(500).call(zoom.transform, t);
}

function setFocus(d){
  focusedNode = d;
  _applyFocusStyles();
  _zoomToFit(d);
  closeSpeciesPopup();
}
// Collapses expandedRoot (the actual force-expanded scope — see its
// declaration above) back to its pre-focus state and re-renders that fan,
// so D3's exit selection (update()'s node.exit()...remove(), already
// correct — it fully removes elements, not just fades them) actually fires
// for the now-hidden nodes and takes them out of the DOM. This is the one
// place that does this collapse — shared by clearFocus() (background click
// / re-click) and toggle()'s "focus something else" path (switching focus
// must retract the PREVIOUS expansion too, not leave it sitting there).
function _collapseExpanded(){
  if (!expandedRoot) return;
  // Restore expandedRoot's subtree to the canonical REST state (every genus
  // re-collapsed at species; genera themselves left visible) instead of
  // nulling expandedRoot.children. The old null collapsed the clicked family
  // ONE LEVEL below rest — its genera became unreachable to .children walks,
  // so genus dots/labels exited while links were left stranded (case A
  // over-collapse residue). This mirrors init's rest-collapse rule
  // (rootH.each / fungiRootH.each) verbatim, applied to this subtree only, so
  // the clicked family ends identical to its siblings and no layer strands.
  expandedRoot.each(d => {
    if (d.data.rank === "genus" && d.children) { d._children = d.children; d.children = null; }
  });
  // Which fan expandedRoot belongs to determines which fixed set of render
  // params (root/arc/arcStart/gatherTrunk/groups) update() needs — same
  // fungi:true flag colourFor()/link-stroke already key off.
  if (expandedRoot.data.fungi) {
    update(expandedRoot, fungiRootH, FUNGI_ARC, FUNGI_ARC_START, false, fungiLinkG, fungiNodeG);
  } else {
    update(expandedRoot, rootH, PLANT_ARC, ARC_START, true, linkG, nodeG);
  }
  expandedRoot = null;
}

function clearFocus(){
  _collapseExpanded();
  focusedNode = null;
  _applyFocusStyles();
  centre();
  closeSpeciesPopup();
}

// Species-click popup — navigation only. Shows a thumbnail (if one exists),
// the scientific name, and a link to the existing, canonical read-only
// species-card route (matches the Seasons-page convention exactly:
// /species?s=<encoded scientific name>, see frontend/seasons.html's
// card-link). Read-only GET only — no DB writes of any kind, from here or
// anywhere in taxonomy.html. The thumbnail is fetched from the existing
// /api/species/{name}/observations endpoint (thumbnail + coords + date +
// review status only — no edibility/verdict/warnings in that response at
// all), and only the thumbnail field is ever read from it. Species clicks
// don't touch focusedNode/dimming/zoom at all, so an open popup can sit
// alongside an existing internal-rank focus without disturbing it; any
// subsequent focus change (setFocus/clearFocus, i.e. any internal-rank
// click or a background click) closes the popup, so it never goes stale.
async function openSpeciesPopup(d, e){
  const nameEl  = document.getElementById("species-popup-name");
  const linkEl  = document.getElementById("species-popup-link");
  const thumbEl = document.getElementById("species-popup-thumb");
  const popup   = document.getElementById("species-popup");

  thumbEl.classList.remove("visible");
  thumbEl.src = "";

  const sciName = d.data.name;
  if (!sciName) {
    nameEl.textContent = "Can't open card — species name unavailable";
    linkEl.style.display = "none";
  } else {
    nameEl.textContent = sciName;
    linkEl.href = "/species?s=" + encodeURIComponent(sciName);
    linkEl.style.display = "inline-block";
  }

  popup.style.left = (e.clientX + 14) + "px";
  popup.style.top  = (e.clientY + 14) + "px";
  popup.classList.add("visible");

  if (!sciName) return;

  try {
    const resp = await fetch("/api/species/" + encodeURIComponent(sciName) + "/observations");
    if (!resp.ok) return;
    const obs = await resp.json();
    const withThumb = Array.isArray(obs) ? obs.find(o => o.thumbnail) : null;
    // Popup may have moved on to a different species (or closed) by the
    // time this resolves — only apply the image if it's still relevant.
    if (withThumb && popup.classList.contains("visible") && nameEl.textContent === sciName) {
      thumbEl.src = "/thumbnails/" + withThumb.thumbnail.split("/").pop();
      thumbEl.classList.add("visible");
    }
  } catch (err) {
    console.error("species popup thumbnail fetch failed:", err);
  }
}
function closeSpeciesPopup(){
  document.getElementById("species-popup").classList.remove("visible");
}

function showTip(e,d){
  let meta="";
  if (d.data.rank==="family") meta=`${(d.children||d._children||[]).length} genera`;
  else if (d.data.rank==="genus") meta=`${(d.children||d._children||[]).length} species`;
  else if (d.data.rank==="species") meta="confirmed · EXACT lineage";
  tip.html(`<div class="t-rank">${d.data.rank}</div><div class="t-name">${d.data.name}</div><div class="t-meta">${meta}</div>`)
     .style("left",(e.clientX+14)+"px").style("top",(e.clientY+14)+"px").style("opacity",1);
}
function hideTip(){ tip.style("opacity",0); }

// ---- unplaced bucket: tucked at the base near the roots, collapsible ----
function drawUnplaced(){
  const bx = 0, by = 60;                     // just under the trunk base
  let open=false;
  const chips = bucketG.append("g").style("opacity",0).style("pointer-events","none");
  UNPLACED.forEach((u,i)=>{
    const yy = by + 30 + i*18;
    chips.append("circle").attr("cx",bx+16).attr("cy",yy).attr("r",3).attr("fill","var(--unplaced)");
    chips.append("text").attr("x",bx+26).attr("y",yy).attr("dy","0.32em").attr("class","node-label")
      .style("font-size","10px").style("fill","var(--ink-dim)").text(u);
  });
  const knot = bucketG.append("g").style("cursor","pointer")
      .on("click",()=>{ open=!open; chips.transition().duration(250).style("opacity",open?1:0).style("pointer-events",open?"all":"none"); });
  knot.append("circle").attr("cx",bx).attr("cy",by).attr("r",9).attr("fill","var(--unplaced)").attr("stroke","var(--bg)").attr("stroke-width",1.5);
  knot.append("text").attr("x",bx).attr("y",by).attr("text-anchor","middle").attr("dy","0.32em")
    .style("font-size","10px").style("font-weight","700").style("fill","#fff").text(UNPLACED.length);
  knot.append("text").attr("x",bx).attr("y",by+22).attr("text-anchor","middle").attr("class","node-label")
    .style("fill","var(--unplaced)").style("font-size","10px").text("Unplaced");
}

function countConfirmed(){ confirmedCount = rootH.descendants().filter(d=>d.data.rank==="species").length; }

function centre(){
  W=window.innerWidth; H=window.innerHeight;
  svg.attr("viewBox",`0 0 ${W} ${H}`);
  // trunk base sits low-centre; canopy rises upward (negative y), so bias view downward
  const t = d3.zoomIdentity.translate(W*0.5, H*0.72).scale(0.7);
  svg.transition().duration(500).call(zoom.transform, t);
}

// ---------------------------------------------------------------------------
// init — fetch live data, then run the exact same build/render sequence the
// prototype ran synchronously against its hardcoded RAW/FUNGI/UNPLACED.
// ---------------------------------------------------------------------------
document.getElementById("count-badge").textContent = "Loading…";

async function loadAndRender(){
  let data;
  try {
    const resp = await fetch("/api/species/taxonomy-tree");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
  } catch (err) {
    console.error("taxonomy-tree fetch failed:", err);
    document.getElementById("count-badge").textContent = "Failed to load";
    return;
  }

  // Everything downstream of a successful fetch — build + render — is its own
  // failure domain: a stale/malformed body that survives the type guards in
  // buildTree()/buildFungiTree() as a partial tree could still throw elsewhere
  // (d3, layout, etc). Catch it here too, so any such throw fails the badge
  // instead of leaving it stuck on "Loading…" forever.
  try {
    RAW = data.RAW || { Plantae: {} };
    FUNGI = data.FUNGI || {};
    UNPLACED = data.UNPLACED || [];

    // Must run after RAW is populated (reads it directly) and before the
    // first layout()/update() call for either fan (both read PLANT_ARC/
    // ARC_START/FUNGI_ARC/FUNGI_ARC_START) — see function doc for rationale.
    _computePlantArcFromGenusSlots();

    rootH = d3.hierarchy(buildTree());
    rootH.each(d => { if (d.data.rank === "genus" && d.children) { d._children = d.children; d.children = null; } });
    rootH.ang0=0; rootH.rad0=0; rootH.px0=0; rootH.py0=0;

    fungiRootH = d3.hierarchy(buildFungiTree());
    fungiRootH.each(d => { if (d.data.rank === "genus" && d.children) { d._children = d.children; d.children = null; } });
    fungiRootH.ang0=0; fungiRootH.rad0=0; fungiRootH.px0=0; fungiRootH.py0=0;

    update(rootH, rootH, PLANT_ARC, ARC_START, true, linkG, nodeG);
    update(fungiRootH, fungiRootH, FUNGI_ARC, FUNGI_ARC_START, false, fungiLinkG, fungiNodeG);
    drawUnplaced();
    countConfirmed();
    document.getElementById("count-badge").textContent =
      `${confirmedCount} confirmed · ${Object.keys(RAW.Plantae).length} families · ${UNPLACED.length} unplaced`;
    centre();
  } catch (err) {
    console.error("taxonomy-tree render failed:", err);
    document.getElementById("count-badge").textContent = "Failed to load";
  }
}
loadAndRender();

d3.select("#zoom-in").on("click",()=>svg.transition().call(zoom.scaleBy,1.3));
d3.select("#zoom-out").on("click",()=>svg.transition().call(zoom.scaleBy,0.75));
d3.select("#reset").on("click",centre);
window.addEventListener("resize",()=>{ W=window.innerWidth;H=window.innerHeight;svg.attr("viewBox",`0 0 ${W} ${H}`); });

// Legend collapse/expand — mirrors the map page's toggleLegendPanel()/
// closeLegendPanel() (frontend/index.html): a chip toggles a `.visible`
// class on the panel, the panel's own close button removes it.
function toggleLegend(){
  const open = document.getElementById("legend-panel").classList.toggle("visible");
  document.getElementById("legend-chip").setAttribute("aria-expanded", open ? "true" : "false");
}
function closeLegend(){
  document.getElementById("legend-panel").classList.remove("visible");
  document.getElementById("legend-chip").setAttribute("aria-expanded", "false");
}
</script>
